<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bronze" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8B6E3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A3E1E;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DFCBA0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1C1814;stop-opacity:0" />
    </radialGradient>
    <filter id="bronzeTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#C9A96E" surfaceScale="1.5" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="light" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 背景：深色圆角方形 -->
  <rect x="24" y="24" width="464" height="464" rx="56" fill="#1C1814"/>
  <rect x="30" y="30" width="452" height="452" rx="52" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.4"/>

  <!-- 外环光晕 -->
  <circle cx="256" cy="220" r="170" fill="url(#ringGlow)"/>

  <!-- 辅首外圆（青铜质感） -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="url(#bronze)" stroke-width="14"/>
  <circle cx="256" cy="220" r="140" fill="none" stroke="#DFCBA0" stroke-width="1" opacity="0.3"/>

  <!-- 外圆铆钉（八颗） -->
  <g fill="#C9A96E" opacity="0.8">
    <circle cx="256" cy="80" r="7"/>  <circle cx="256" cy="360" r="7"/>
    <circle cx="116" cy="220" r="7"/>  <circle cx="396" cy="220" r="7"/>
    <circle cx="157" cy="121" r="7"/>  <circle cx="355" cy="121" r="7"/>
    <circle cx="157" cy="319" r="7"/>  <circle cx="355" cy="319" r="7"/>
  </g>

  <!-- 内圆 —— 八卦环 -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>

  <!-- 八卦符号 -->
  <g font-size="16" fill="#C9A96E" opacity="0.6" text-anchor="middle">
    <text x="256" y="130">☰</text>  <text x="330" y="142">☱</text>
    <text x="346" y="196">☲</text>  <text x="336" y="254">☳</text>
    <text x="300" y="298">☴</text>  <text x="256" y="308">☵</text>
    <text x="212" y="298">☶</text>  <text x="176" y="254">☷</text>
    <text x="166" y="196">☷</text>  <text x="182" y="142">☳</text>
  </g>

  <!-- 中心太极 -->
  <circle cx="256" cy="220" r="42" fill="none" stroke="url(#bronze)" stroke-width="4"/>

  <!-- 太极阴阳鱼 -->
  <path d="M256,178 A42,42 0 0,1 256,262 A21,21 0 0,0 256,220 A21,21 0 0,1 256,178"
        fill="#C9A96E" opacity="0.9"/>
  <path d="M256,178 A42,42 0 0,0 256,262 A21,21 0 0,1 256,220 A21,21 0 0,0 256,178"
        fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.4"/>

  <!-- 阴眼 -->
  <circle cx="235" cy="210" r="5" fill="#1C1814"/>
  <!-- 阳眼 -->
  <circle cx="277" cy="230" r="5" fill="#C9A96E"/>

  <!-- 门环（悬挂在太极下方） -->
  <circle cx="256" cy="280" r="24" fill="none" stroke="url(#bronze)" stroke-width="6"/>
  <circle cx="256" cy="280" r="28" fill="none" stroke="#DFCBA0" stroke-width="0.5" opacity="0.3"/>
  <!-- 门环连接线 -->
  <line x1="256" y1="256" x2="256" y2="264" stroke="url(#bronze)" stroke-width="5"/>

  <!-- 底部书名 -->
  <text x="256" y="435" text-anchor="middle" font-family="serif" font-size="22"
        fill="#C9A96E" letter-spacing="6" opacity="0.8">命 理 溯 源</text>
</svg>
